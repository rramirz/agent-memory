<tr class="memory-row edit-form">
    <td colspan="7">
        <form hx-post="/ui/memories/{{ .Memory.ID.Hex }}/edit" hx-target="closest tr" hx-swap="outerHTML">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label>Title</label>
                    <input type="text" name="title" value="{{ .Memory.Title }}" required>
                </div>
                <div>
                    <label>Tags (comma separated)</label>
                    <input type="text" name="tags" value="{{ join .Memory.Tags ", " }}">
                </div>
            </div>
            
            <label>Body</label>
            <textarea name="body" rows="6" required>{{ .Memory.Body }}</textarea>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                <div>
                    <label>Type</label>
                    <input type="text" name="type" value="{{ .Memory.Type }}" required>
                </div>
                <div>
                    <label>Project</label>
                    <input type="text" name="project" value="{{ .Memory.Project }}">
                </div>
                <div>
                    <label>Repo</label>
                    <input type="text" name="repo" value="{{ .Memory.Repo }}">
                </div>
            </div>
            
            <div style="margin-top: 1rem;">
                <label>Importance (1-10)</label>
                <input type="number" name="importance" min="1" max="10" value="{{ .Memory.Importance }}" style="width: 100px;">
            </div>

            <div class="edit-actions">
                <button type="submit" class="primary-btn">Save Changes</button>
                <button type="button" class="ghost-btn" style="border: 1px solid var(--border); width: auto;" 
                        hx-get="/ui/memories/list?q={{ .Memory.ID.Hex }}" 
                        hx-target="closest tr" 
                        hx-swap="outerHTML" 
                        onclick="window.location.reload();">Cancel</button>
            </div>
        </form>
    </td>
</tr>
