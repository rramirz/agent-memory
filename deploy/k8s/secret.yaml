# DO NOT commit real values. Create this manually:
#   kubectl -n agent-memory create secret generic memory-api-secret \
#     --from-literal=MONGO_URI='mongodb://mongodb.agent-memory.svc.cluster.local:27017' \
#     --from-literal=MONGO_DATABASE='agent_memory' \
#     --from-literal=MEMORY_TOKENS='home-mac-token:personal' \
#     --from-literal=ADMIN_TOKEN='admin-token-here'
#
# Token format (one per line): <token>:<org1>,<org2>
# Lines starting with # are comments — use them to label which machine owns each token.
# ADMIN_TOKEN guards /v1/admin/* and the /ui web console. If unset, admin + UI are disabled.
apiVersion: v1
kind: Secret
metadata:
  name: memory-api-secret
  namespace: agent-memory
type: Opaque
stringData:
  MONGO_URI: "mongodb://mongodb.agent-memory.svc.cluster.local:27017"
  MONGO_DATABASE: "agent_memory"
  MEMORY_TOKENS: |
    REPLACE_LOGICBROKER_TOKEN:logicbroker
    REPLACE_ARRIVE_TOKEN:arrive
    REPLACE_HOME_MAC_TOKEN:personal
