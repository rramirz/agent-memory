apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: memory-api
  namespace: agent-memory
spec:
  parentRefs:
    - name: home
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - memory.theramirez.casa
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: memory-api
          port: 80
